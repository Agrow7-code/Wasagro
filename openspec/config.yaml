schema: spec-driven

context: |
  Project: Wasagro — agricultural field OS, AI-first
  Horizon: H0 — Problem Validation only
  Stack: Supabase (PostGIS/JSONB/RLS) + n8n + GPT-4o Mini + WhatsApp Business API + LangFuse self-hosted
  Channel: WhatsApp (text, audio .opus, image)
  Repo state: SQL schema + n8n flows + prompts (no framework, no package.json)

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify which CLAUDE.md principles each decision serves
    - Justify every tool/library against Capa 2 criteria
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Reference AGENTS.md rules by number (R1-R5) when applicable
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Every LLM/STT call must show LangFuse logging path
  tasks:
    - Group tasks by phase (schema, flows, prompts, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow AGENTS.md guardrails — GGA verifies on every commit
    - SQL: tablas en español snake_case, UUID PKs, migraciones numeradas
    - Prompts: no vocabulario prohibido, tuteo Ecuador/Guatemala, máx 3 líneas
    - n8n: un flujo por caso de uso, nodos con nombre descriptivo en español
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
