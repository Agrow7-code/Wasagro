name: Deploy Landing to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_Ax1sJw5aoeX3PaqvjbKMUct1
          VERCEL_PROJECT_ID: prj_Ou2lJCOoYdyKrD0LdLF9eGb85cCa
