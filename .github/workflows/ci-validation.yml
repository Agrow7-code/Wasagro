name: CI - Validation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # landing/ is an independent npm project (own package.json + node_modules).
      # The root `npm test` runs both the backend and the `landing` vitest
      # project (see vitest.config.ts), and the landing project resolves its
      # own deps (e.g. @vitejs/plugin-react, jsdom) from landing/node_modules —
      # so they must be installed here or the root test run fails to load
      # landing/vitest.config.ts.
      - name: Install landing dependencies
        run: npm ci
        working-directory: landing

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npx tsc

      - name: Run tests
        run: npm test
        env:
          # Dummy values — tests must mock external services, never hit them.
          # Required only because some modules validate env at import time.
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
          SUPABASE_ANON_KEY: ci-dummy-anon-key
          EVOLUTION_WEBHOOK_SECRET: ci-dummy-webhook-secret
          DEEPGRAM_API_KEY: ci-dummy-deepgram-key
