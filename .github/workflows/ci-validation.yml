name: CI - Validation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npx tsc

      - name: Run tests
        run: npm test
        env:
          # Dummy values — tests must mock external services, never hit them.
          # Required only because some modules validate env at import time.
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
          SUPABASE_ANON_KEY: ci-dummy-anon-key
          EVOLUTION_WEBHOOK_SECRET: ci-dummy-webhook-secret
          DEEPGRAM_API_KEY: ci-dummy-deepgram-key
